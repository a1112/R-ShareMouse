version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # 忽略可能导致破坏性变更的更新
      - dependency-name: "enigo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "thiserror"
        update-types: ["version-update:semver-major"]
      - dependency-name: "egui"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eframe"
        update-types: ["version-update:semver-major"]
